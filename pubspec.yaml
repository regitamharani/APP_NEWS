name: app_news
description: Flutter News App - UTS Lab Mobile Development

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  provider: ^6.1.1
  # HTTP requests
  http: ^1.2.0
  # Offline caching
  shared_preferences: ^2.2.2
  # Connectivity check
  connectivity_plus: ^5.0.2
  # Shimmer loading effect
  shimmer: ^3.0.0
  # JSON parsing helper
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true